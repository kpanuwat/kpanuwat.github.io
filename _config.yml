theme: jekyll-theme-chirpy

# ── Site Identity ───────────────────────────────────────────────────────────
title: Engineering Insight Hub
tagline: Sharing knowledge & experience in EMS engineering management
description: A personal knowledge sharing space — engineering, EMS, tools, and systems.
url: "https://kpanuwat.github.io"
baseurl: ""

# ── Author ──────────────────────────────────────────────────────────────────
github:
  username: kpanuwat

social:
  name: kpanuwat
  email: ""
  links: []

# ── Appearance ──────────────────────────────────────────────────────────────
theme_mode:          # leave blank = follows OS preference; set "light" or "dark" to lock
avatar: ""

# ── Content ─────────────────────────────────────────────────────────────────
timezone: Asia/Bangkok
lang: en

paginate: 10

# ── Comments (optional) ─────────────────────────────────────────────────────
comments:
  active:
  giscus:
    repo:
    repo_id:
    category:
    category_id:

# ── Search ──────────────────────────────────────────────────────────────────
search:
  provider: lunr

# ── Analytics (optional) ────────────────────────────────────────────────────
analytics:
  google:
    id:

# ── Collections ─────────────────────────────────────────────────────────────
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      math: false
      mermaid: false
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

# ── Build ────────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

compress_html:
  clippings: all
  comments: all
  endings: all

keep_files: [slides]

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
